<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top Tables • Rootelo</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <style>
        {base_css}
        {custom_css}
    </style>
    
</head>
<body>
    <div class="container">
        <header class="site-header">
            <div class="banner-container">
                <div class="banner-icons left">
                    <img src="assets/icons/bird.png">
                    <img src="assets/icons/fox.png">
                </div>
                <div class="banner-center">
                    <h1 class="site-title">ROOTELO</h1>
                    <p class="site-subtitle">A Metric of Woodland Skill and Will</p>
                </div>
                <div class="banner-icons right">
                    <img src="assets/icons/rabbit.png">
                    <img src="assets/icons/mouse_new.webp">
                </div>
            </div>
        </header>

        <nav><a href="index.html" class="">Leaderboard</a><a href="matches.html" class="active">Top Tables</a><a href="trends.html" class="">Player's Journey</a><a href="about.html" class="">Codex</a></nav>
        <div class="season-selector"><span class="season-label">Season</span><a href="matches_lh01.html" class="season-btn ">LH01</a><a href="matches.html" class="season-btn active">LH02</a></div>

        <header class="page-intro">
            <h2>Top Tables</h2>
            <h3>LH02 • Apr–Jun 2026</h3>
            <p>Games ranked by total ELO. Search by player or date. Click a Game ID to view full match details on the League website.</p>
        </header>
    
        <main>
        <table id="matchesTable" class="display nowrap responsive" style="width:100%">
            <thead><tr><th>Rank</th><th>ELO</th><th>Date</th><th>Lineup (Winner First)</th><th>ID</th></tr></thead>
            <tbody></tbody>
        </table>
    </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script>
    $(document).ready(function() {
        $('#matchesTable').DataTable({
            "order": [[1, "desc"]], 
            "responsive": true, 
            "pageLength": 25,
            "columnDefs": [
                { "width": "40px", "targets": [0, 1] },
                { "className": "lineup-cell", "targets": 3 }, 
                { "responsivePriority": 1, "targets": [0, 1, 3] },
                { "responsivePriority": 2, "targets": 2 }, 
                { "responsivePriority": 3, "targets": 4 }
            ]
        });
    });
    </script>
</body>
</html>
