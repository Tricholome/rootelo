    <style>
        /* =========================================================================
           --- 1. CONFIGURATION PANEL (CSS VARIABLES) ---
           ========================================================================= */
        :root {
            /* Faction Colors */
            --color-bird: #4A6FA5;
            --color-fox: #C0392B;
            --color-rabbit: #D4AF37;
            --color-mouse: #E7A16F;

            /* Typography */
            --font-title: 'Fraunces', serif;
            --font-ui: 'Inter', sans-serif;

            /* Background Colors */
            --bg-page: #121212;
            --bg-container: #1c1c1c; 
            --bg-surface: rgba(255, 255, 255, 0.03); 
            --bg-hover: rgba(255, 255, 255, 0.08);

            /* Text Colors */
            --text-main: #E0E0E0; 
            --text-muted: #888888;
            --text-dark: #111111; 

            /* Borders */
            --border-soft: #333333;
        }

        /* --- DYNAMIC THEME MANAGEMENT --- */
        body[data-page="index"]   { --main-color: var(--color-bird); }
        body[data-page="matches"] { --main-color: var(--color-fox); }
        body[data-page="trends"]  { --main-color: var(--color-rabbit); }
        body[data-page="about"]   { --main-color: var(--color-mouse); }
        body { --main-color: #d4a76a; }

        /* =========================================================================
           --- 2. GLOBAL STYLES ---
           ========================================================================= */
        body { 
            font-family: var(--font-ui); 
            background: var(--bg-page); 
            color: var(--text-main); 
            text-align: center; 
            padding: 20px 5px; 
            margin: 0; 
            overflow-x: hidden; 
        }
        
        .container { 
            width: 95%; 
            max-width: 1100px; 
            margin: auto; 
            background: var(--bg-container); 
            padding: 20px 30px 20px; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); 
            box-sizing: border-box; 
        }
        
        /* =========================================================================
           --- 3. HEADER & BANNER ---
           ========================================================================= */
        .banner-container { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 20px; flex-wrap: nowrap; }
        .banner-icons { display: flex; gap: -10px; align-items: center; }
        .banner-icons img { 
            width: 85px; height: 85px; object-fit: contain; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6)); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer;
            margin: 0 -5px; 
            position: relative;
        }
        .banner-icons img:hover { 
            width: 140px; height: 140px; 
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.9));
            transform: translateY(-10px) scale(1.15);
            z-index: 100;
            margin: 0 15px;
        }
        .banner-icons.left img:hover { transform: translateY(-10px) scale(1.15) rotate(-8deg); }
        .banner-icons.right img:hover { transform: translateY(-10px) scale(1.15) rotate(8deg); }

        .site-title { 
            font-family: var(--font-title);
            color: #ffffff; 
            font-size: 2.8em; 
            margin: 0; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-weight: 900; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .site-subtitle { 
            font-family: var(--font-title);
            font-style: italic; 
            color: var(--text-muted); 
            font-size: 1em; 
            margin: 5px 0 0; 
            letter-spacing: 1px; 
        }
        
        /* =========================================================================
           --- 4. NAVIGATION & BUTTONS ---
           ========================================================================= */
        nav { 
            margin: 25px 0; 
            border-bottom: 1px solid var(--border-soft); 
            padding-bottom: 20px; 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            flex-wrap: wrap; 
        }
        
        nav a { 
            color: var(--text-muted); 
            text-decoration: none; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.85em; 
            letter-spacing: 1px;
            padding: 8px 12px; 
            border-radius: 6px; 
            transition: 0.3s ease; 
            border-bottom: 2px solid transparent; 
        }
        
        nav a:hover { 
            color: var(--text-main); 
            background: var(--bg-hover); 
        }
        
        /* Active Tab */
        nav a.active { 
            color: var(--main-color); 
            border-bottom: 2px solid var(--main-color);
            border-radius: 6px 6px 0 0; 
            background: linear-gradient(to top, rgba(255,255,255,0.03) 0%, transparent 100%);
        }
        
        /* --- SEASON SELECTOR (ANGULAR STYLE) --- */
        .season-selector { 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            margin: 20px auto 10px; 
            background: none; 
            width: fit-content; 
        }
        .season-label { font-size: 0.7em; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.2px; font-weight: bold; margin-right: 5px;}
        .season-btn { 
            text-decoration: none; 
            font-size: 0.75em; 
            font-weight: 700; 
            color: var(--text-muted); 
            padding: 6px 14px; 
            border-radius: 4px; /* Angular look */
            background: var(--bg-surface);
            border: 1px solid var(--border-soft); 
            transition: 0.2s; 
        }
        .season-btn:hover { color: var(--text-main); background: var(--bg-hover); }
        .season-btn.active { 
            background: transparent !important; 
            color: var(--main-color) !important; 
            border-color: var(--main-color) !important; 
        }

        /* =========================================================================
           --- 5. PAGE TITLES & DATA ---
           ========================================================================= */
        .page-intro { margin-bottom: 30px; }
        .page-intro h2 { 
            font-family: var(--font-title);
            font-size: 2.2em;
            margin: 0;
            color: var(--main-color);
        }
        .page-intro p {
            color: var(--text-muted);
            font-family: var(--font-ui);
            font-size: 0.9em;
            margin: 15px auto 0;
            max-width: 700px;
        }

        /* --- GENERIC DATATABLES OVERRIDES --- */
        table.dataTable { border-collapse: collapse !important; }
        table.dataTable thead th { 
            background: var(--bg-page) !important; 
            color: var(--text-muted) !important; 
            font-size: 0.75em; 
            letter-spacing: 1px;
            text-transform: uppercase; 
            padding: 15px 10px !important; 
            border-bottom: 1px solid var(--border-soft) !important;
        }
        table.dataTable tbody tr { background-color: transparent !important; }
        table.dataTable tbody td { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 12px 10px; }
        
        /* =========================================================================
           --- 6. GLOBAL FOOTER ---
           ========================================================================= */
        .site-footer { 
            margin-top: 50px; padding: 30px 20px; text-align: center;
            border-top: 1px solid var(--border-soft); color: var(--text-muted); 
             font-family: var(--font-ui); font-size: 0.8em; 
        }

        .footer-credits { display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }

        .footer-credits span:not(.footer-separator) { flex: 1; }
        .footer-credits span:first-child { text-align: right; }
        .footer-credits span:last-child { text-align: left; }

        .footer-credits strong { color: var(--text-main); font-weight: 600; }
        .footer-separator { margin: 0 15px; color: var(--border-soft); opacity: 0.5; }
        .footer-date { font-style: italic; opacity: 0.7; display: block; }

        /* =========================================================================
           --- 7. MOBILE RESPONSIVE ---
           ========================================================================= */
        @media (max-width: 768px) and (orientation: portrait) {
            .banner-container { flex-wrap: wrap; gap: 10px; }
            .banner-center { order: 1; width: 100%; margin-bottom: 10px; }
            .banner-icons { order: 2; gap: 5px; display: flex; flex-wrap: nowrap; }
            .banner-icons img { width: 60px !important; height: 60px !important; transition: all 0.3s ease; }
            .banner-icons img:hover { z-index: 100; position: relative; }
            .banner-icons.left img:hover { transform: translateY(-8px) scale(1.4) rotate(-8deg) !important; }
            .banner-icons.right img:hover { transform: translateY(-8px) scale(1.4) rotate(8deg) !important; }
            .site-title { font-size: 2em; }
            .footer-credits span { display: block; margin: 5px 0; }
            .footer-separator { display: none !important; }
        }
