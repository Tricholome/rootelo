name: Update Rootelo Website

on:
  workflow_dispatch: 

concurrency:
  group: rootelo-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ELO calculation and site generation
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          python main.py
          mkdir rootelo_site
          cp *.html rootelo_site/
          cp -r static rootelo_site/
          cp -r assets rootelo_site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./rootelo_site
          publish_branch: gh-pages
