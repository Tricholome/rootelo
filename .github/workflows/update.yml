name: Update ELO and Webpage

on:
  schedule:
    - cron: '0 4 * * *' # Se lance tous les jours à 4h du matin
  workflow_dispatch: # Permet de le lancer à la main pour tester

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Autorise GitHub à enregistrer le fichier index.html
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Run Elo Script
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: python elo_script.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
