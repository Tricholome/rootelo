name: Update Rootelo Leaderboard

on:
  schedule:
    - cron: '0 0 * * *' # Se lance tous les jours à minuit UTC
  workflow_dispatch:      # Permet de le lancer manuellement d'un clic

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-context: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests openpyxl jinja2

      - name: Run ELO calculation and site generation
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }} # On utilise ton Token de manière sécurisée
        run: python main.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages # Tes fichiers HTML iront ici
