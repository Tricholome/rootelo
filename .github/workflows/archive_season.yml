name: Archive Season Data

on:
  workflow_dispatch:
    inputs:
      season_tag:
        description: 'Season tag to archive (e.g., lh02)'
        required: true
        default: 'lh02'
      previous_season_tag:
        description: 'Previous season tag (e.g., lh01) - Leave empty if none'
        required: false
      tournament_id:
        description: 'Tournament ID on the API (e.g., 25)'
        required: true
        default: '25'
      cutoff_date:
        description: 'Cutoff date in YYYY-MM-DD format'
        required: true
        default: '2026-06-30'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Archive Script
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          SEASON_TAG: ${{ github.event.inputs.season_tag }}
          PREVIOUS_SEASON_TAG: ${{ github.event.inputs.previous_season_tag }}
          TOURNAMENT_ID: ${{ github.event.inputs.tournament_id }}
          CUTOFF_DATE_STR: ${{ github.event.inputs.cutoff_date }}
        run: python archive_season.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/*.csv data/*.json
          
          git commit -m "Automated update of season archives (${{ github.event.inputs.season_tag }})" || echo "No changes to commit"
          git push
