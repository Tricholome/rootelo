name: Run Analytics

on:
  workflow_dispatch: # Permet de déclencher le script manuellement avec un bouton

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/embed/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas

      - name: Run Analytics Script
        run: python analytics.py

      - name: Upload CSV Result
        uses: actions/upload-artifact@v4
        with:
          name: elo-deltas-csv
          path: data/all_seasons_players_deltas.csv
