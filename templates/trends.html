{% extends "base.html" %}

{% block extra_head %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- Organigramme binaire épuré (Jaune Lapin) --- */
        .relations-wrapper {
            margin-top: 40px;
            padding: 20px;
            background-color: rgba(43, 37, 27, 0.3);
            border-radius: 12px;
            color: #f7f5f0;
        }

        .relations-title {
            text-align: center;
            color: #f3c64f;
            margin-bottom: 25px;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .relations-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            height: 200px;
        }

        .node {
            background: #2c2416;
            border: 2px solid #a1814c;
            border-radius: 8px;
            padding: 12px 18px;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            position: relative;
        }

        .central-node {
            border-color: #f3c64f;
            background: #3a301d;
            text-align: center;
        }

        .target-node {
            cursor: pointer;
        }

        .target-node:hover {
            border-color: #f3c64f;
            transform: scale(1.02);
        }

        .player-name {
            font-weight: bold;
            display: block;
            font-size: 1.1rem;
        }

        .target-nodes {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .role-tag {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            font-weight: bold;
            color: #f3c64f;
        }

        .action-text {
            font-size: 0.95rem;
            color: #e6e2da;
        }

        .relations-lines {
            position: absolute;
            left: 215px;
            right: 215px;
            height: 100%;
            width: calc(100% - 430px);
            pointer-events: none;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="search-box">
        <input type="search" list="playerList" id="playerName" value="" placeholder="Search Player..." oninput="updatePlayerView()">
        <datalist id="playerList">
            {% for name in player_names %}
                <option value="{{ name }}">
            {% endfor %}
        </datalist>
    </div>
    
    <div class="chart-wrapper">
        <div class="chart-container">
            <canvas id="progressionChart"></canvas>
        </div>
    </div>

    <div class="relations-wrapper">
        <div class="relations-title">Chroniques des Clairières</div>
        <div class="relations-container">
            
            <div class="node central-node">
                <div class="role-tag">Active Player</div>
                <span class="player-name" id="centerPlayerName">Select a player</span>
            </div>

            <svg class="relations-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M 0 50 C 50 50, 50 20, 100 20" stroke="#f3c64f" stroke-width="2.5" fill="none" />
                <path d="M 0 50 C 50 50, 50 80, 100 80" stroke="#f3c64f" stroke-width="2.5" fill="none" />
            </svg>

            <div class="target-nodes">
                <div class="node target-node" id="nodeNemesis" onclick="selectPlayerFromTree(this)" data-player="">
                    <div class="role-tag">Top Nemesis</div>
                    <span class="action-text" id="textNemesis">...</span>
                </div>
                
                <div class="node target-node" id="nodeTarget" onclick="selectPlayerFromTree(this)" data-player="">
                    <div class="role-tag">Favorite Target</div>
                    <span class="action-text" id="textTarget">...</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Injecte les données réelles calculées par Python
        const relationsData = {{ relations_json | safe }};

        function updateRelationsTree(playerName) {
            const data = relationsData[playerName];
            
			if (data) {
				document.getElementById('centerPlayerName').innerText = playerName;
				
				const trophy = data.trophy.name ? `${data.trophy.name} (${data.trophy.elo} Elo)` : "None yet";
				document.getElementById('textTarget').innerHTML = `<strong>My Trophy:</strong> ${trophy}`;
				document.getElementById('nodeTarget').setAttribute('data-player', data.trophy.name || '');
				
				const bane = data.bane.name ? `${data.bane.name} (${data.bane.elo} Elo)` : "No bane yet";
				document.getElementById('textNemesis').innerHTML = `<strong>My Bane:</strong> ${bane}`;
				document.getElementById('nodeNemesis').setAttribute('data-player', data.bane.name || '');
			}
        }

        function selectPlayerFromTree(element) {
            const clickedName = element.getAttribute('data-player');
            if (clickedName) {
                document.getElementById('playerName').value = clickedName;
                updatePlayerView();
            }
        }

        function updatePlayerView() {
            const currentPlayer = document.getElementById('playerName').value;
            if (currentPlayer) {
                updateRelationsTree(currentPlayer);
                // Si tu as une fonction updateChart existante, appelle-la ici :
                // updateChart(currentPlayer); 
            }
        }

        window.onload = function() {
            // Initialisation si besoin
            const firstPlayer = document.getElementById('playerName').value;
            if (firstPlayer) updatePlayerView();
        };
    </script>
{% endblock %}
