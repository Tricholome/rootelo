{% extends "base.html" %}

{% block extra_head %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block extra_css %}
<style>
    .search-box { margin: 20px 0; text-align: center; }
    input { 
        background: #252525; color: #fff; border: 1px solid #444; 
        padding: 12px; border-radius: 8px; width: 95%; max-width: 450px; 
        font-size: 16px; box-sizing: border-box; outline: none;
    }
    input:focus { border-color: var(--color-rabbit); } /* Focus couleur lapin */

    .landscape-hint { 
        display: none; color: #666; font-size: 0.7em; 
        margin-bottom: 10px; text-transform: uppercase; 
        letter-spacing: 1px; text-align: center;
    }

    /* Correction du centrage */
    .chart-wrapper { 
        width: 100%; 
        max-width: 1000px; /* On aligne sur la largeur max du contenu */
        margin: 0 auto;    /* Centrage horizontal */
        padding: 0;        /* On enlève les paddings qui décalent */
        box-sizing: border-box; 
    }

    .chart-container { 
        position: relative; 
        width: 100%; 
        height: 55vh; 
        background: #1a1a1a; 
        border-radius: 12px; 
        border: 1px solid #252525; 
        padding: 10px;    /* Réduit pour laisser plus de place au canvas */
        box-sizing: border-box;
    }

    @media (max-width: 768px) and (orientation: portrait) { 
        .landscape-hint { display: block; } 
    }
</style>
{% endblock %}

{% block content %}
    <div class="search-box">
        <input list="playerList" id="playerName" placeholder="Search Player..." oninput="updateChart()">
        <datalist id="playerList">
            {% for name in player_names %}
                <option value="{{ name }}">
            {% endfor %}
        </datalist>
    </div>

    <div class="landscape-hint">🔄 Rotate phone for detail</div>
    
    <div class="chart-wrapper">
        <div class="chart-container">
            <canvas id="progressionChart"></canvas>
        </div>
    </div>
{% endblock %}

{% block custom_js %}
<script>
    const allData = {{ history_json | safe }};
    let myChart;

    function updateChart() {
        const name = document.getElementById('playerName').value;
        const canvas = document.getElementById('progressionChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        // On récupère explicitement la couleur Rabbit définie dans ton root
        const rabbitColor = getComputedStyle(document.documentElement)
                            .getPropertyValue('--color-rabbit').trim() || '#E0B634';
        
        if (allData[name]) {
            const rawData = allData[name];
            const labels = rawData.map(d => d[0]);
            const eloScores = rawData.map(d => d[1]);

            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: eloScores,
                        borderColor: rabbitColor,
                        backgroundColor: rabbitColor + '22', // Transparence légère (22 hex)
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3,
                        pointBackgroundColor: rabbitColor,
                        pointHitRadius: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: { left: 5, right: 15, top: 10, bottom: 5 }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { 
                            enabled: true, 
                            mode: 'index', 
                            intersect: false, 
                            backgroundColor: '#222',
                            titleColor: rabbitColor,
                            bodyColor: '#eee',
                            borderColor: '#444',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: { 
                            grid: { color: '#252525' }, 
                            ticks: { color: '#888', font: { size: 11 } } 
                        },
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: '#888', font: { size: 10 }, maxTicksLimit: 6 } 
                        }
                    }
                }
            });
        }
    }

    window.onload = updateChart;
</script>
{% endblock %}
