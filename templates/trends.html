{% extends "base.html" %}

{% block extra_head %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- Organigramme horizontal épuré --- */
        .relations-wrapper {
            margin-top: 40px;
            padding: 20px;
            background-color: rgba(43, 37, 27, 0.3);
            border-radius: 12px;
            color: #f7f5f0;
        }

        .relations-title {
            text-align: center;
            color: #f3c64f;
            margin-bottom: 25px;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .relations-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            max-width: 750px;
            margin: 0 auto;
            height: 260px;
        }

        .left-column {
            flex: 0 0 240px;
        }

        .middle-space {
            flex: 1;
            height: 100%;
            min-width: 60px;
            position: relative;
        }

        .right-column {
            flex: 0 0 240px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .tier-icon {
            width: 32px;
            height: 32px;
            vertical-align: middle;
            margin-right: 8px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
        }

        .node {
            background: #2c2416;
            border: 2px solid #a1814c;
            border-radius: 8px;
            padding: 12px 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-align: center;
        }

        .target-node {
            cursor: pointer;
        }

        .node.central-node {
            border-color: #f3c64f;
        }

        .role-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a1814c;
            margin-bottom: 4px;
        }

        .action-text, .player-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .relations-lines {
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="search-box">
        <input type="search" list="playerList" id="playerName" value="" placeholder="Search Player..." oninput="updatePlayerView()">
        <datalist id="playerList">
            {% for name in player_names %}
                <option value="{{ name }}">
            {% endfor %}
        </datalist>
    </div>
    
    <div class="chart-wrapper">
        <div class="chart-container">
            <canvas id="progressionChart"></canvas>
        </div>
    </div>

    <div class="relations-wrapper">
        <div class="relations-title">Chroniques des Clairières</div>
        <div class="relations-container">
            
            <div class="left-column">
                <div class="node central-node">
                    <div class="role-tag">Active Player</div>
                    <span class="player-name" id="centerPlayerName">Select a player</span>
                </div>
            </div>

            <div class="middle-space">
                <svg class="relations-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M 0 50 L 50 50 L 50 20 L 100 20" stroke="#f3c64f" stroke-width="2.5" fill="none" />
                    <path d="M 0 50 L 50 50 L 50 80 L 100 80" stroke="#f3c64f" stroke-width="2.5" fill="none" />
                </svg>
            </div>

            <div class="right-column">
                <div class="node target-node" id="nodeTarget" onclick="selectPlayerFromTree(this)" data-player="">
                    <div class="role-tag">Top Nemesis (Trophy)</div>
                    <div class="action-text" id="textTarget">...</div>
                </div>

                <div class="node target-node" id="nodeNemesis" onclick="selectPlayerFromTree(this)" data-player="">
                    <div class="role-tag">Favorite Target (Bane)</div>
                    <div class="action-text" id="textNemesis">...</div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        const relationsData = {{ relations_json | safe }};
        const tierIcons = {{ config.assets.icons | tojson }};

        function getIconHtml(tier) {
            if (!tier || tier === 'unranked' || !tierIcons[tier]) return '';
            const iconUrl = tierIcons[tier];
            return `<img src="${iconUrl}" class="tier-icon" alt="${tier}">`;
        }

        function updateRelationsTree(playerName) {
            const data = relationsData[playerName];
            
            if (data) {
                document.getElementById('centerPlayerName').innerText = playerName;
                
                // Trophy (Haut Droite)
                const trophyName = data.trophy.name || "None";
                const trophyElo = data.trophy.name ? ` (${data.trophy.elo} ELO)` : "";
                const trophyIcon = data.trophy.tier ? getIconHtml(data.trophy.tier) : "";
                document.getElementById('textTarget').innerHTML = `${trophyIcon} <strong>${trophyName}</strong>${trophyElo}`;
                document.getElementById('nodeTarget').setAttribute('data-player', data.trophy.name || '');
                
                // Bane (Bas Droite)
                const baneName = data.bane.name || "None";
                const baneElo = data.bane.name ? ` (${data.bane.elo} ELO)` : "";
                const baneIcon = data.bane.tier ? getIconHtml(data.bane.tier) : "";
                document.getElementById('textNemesis').innerHTML = `${baneIcon} <strong>${baneName}</strong>${baneElo}`;
                document.getElementById('nodeNemesis').setAttribute('data-player', data.bane.name || '');
            }
        }
		
        function selectPlayerFromTree(element) {
            const clickedName = element.getAttribute('data-player');
            if (clickedName) {
                document.getElementById('playerName').value = clickedName;
                updatePlayerView();
            }
        }

        function updatePlayerView() {
            const currentPlayer = document.getElementById('playerName').value;
            if (currentPlayer) {
                updateRelationsTree(currentPlayer);
            }
        }

        window.onload = function() {
            const firstPlayer = document.getElementById('playerName').value;
            if (firstPlayer) updatePlayerView();
        };
    </script>
{% endblock %}
