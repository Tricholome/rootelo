{% extends "base.html" %}

{% block extra_head %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}
    <div class="search-box">
        <input type="search" list="playerList" id="playerName" value="" placeholder="Search Player..." oninput="updatePlayerView()">
        <datalist id="playerList">
            {% for name in player_names %}
                <option value="{{ name }}">
            {% endfor %}
        </datalist>
    </div>
    
    <div class="chart-wrapper">
        <div class="chart-container">
            <canvas id="progressionChart"></canvas>
        </div>
    </div>

    <div class="relations-wrapper">
        <div class="relations-container">
            
            <div class="left-column">
                <div class="node central-node">
                    <div class="narrative-text">On this winding journey,</div>
                    <div class="player-name" id="centerPlayerName">Select a player</div>
                    <div id="centerPlayerMeta"></div>
                </div>
            </div>

            <div class="middle-space">
                <svg class="relations-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M 0 50 C 50 50, 50 20, 100 20" stroke="#f3c64f" stroke-width="2.5" fill="none" />
                    <path d="M 0 50 C 50 50, 50 80, 100 80" stroke="#f3c64f" stroke-width="2.5" fill="none" />
                </svg>
            </div>

            <div class="right-column">
                <div class="node interactive-node" id="nodeTrophy" onclick="selectPlayerFromTree(this)" data-player="">
                    <div id="textTrophy">
                        <div class="player-name">...</div>
                    </div>
                </div>

                <div class="node interactive-node" id="nodeBane" onclick="selectPlayerFromTree(this)" data-player="">
                    <div id="textBane">
                        <div class="player-name">...</div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
		window.NARRATIVE_VARIATIONS = {
			center: [
				"On this winding journey,",
				"Deep within the Woodland,",
				"Following the hidden paths,",
				"Beneath the Great Tree's shadow,",
				"Through thickets and clearings,",
				"As seasons turn and change"
			],
			trophy: [
				"claimed their proudest trophy by outsmarting",
				"brought down the Woodland's towering giant,",
				"secured a legendary triumph against",
				"scored a masterclass victory over",
				"left their permanent mark by defeating",
				"won a historic battle of wits against"
			],
			trophy_empty: [
				"No trophies claimed this season.",
				"The trophy room remains quiet for now.",
				"No legendary triumphs recorded yet.",
				"No towering giants were brought down this season.",
				"Yet to leave a permanent mark on a top-ranked rival.",
				"Still hunting for that definitive, historic victory."
			],
			bane: [
				"yet suffered their bitterest defeat against",
				"but met their ultimate match in",
				"while their grand plans were foiled by",
				"only to be cornered in the briars by",
				"yet fell before the cunning tactics of",
				"but met an unstoppable nemesis named"
			],
			bane_empty: [
				"Remained undefeated by lower-ranked rivals.",
				"Left no openings for lesser foes to exploit.",
				"Maintained a flawless defense against the underdogs.",
				"Walked through the briars completely unscathed.",
				"Successfully parried every ambush this season.",
				"Suffered no bitter upsets along the way."
			],
			opponents: [
				"after testing their mettle against {count} unique rivals.",
				"having crossed blades with {count} different wanderers.",
				"leaving a trail of {count} unique opponents in their wake.",
				"forging a legacy across encounters with {count} distinct souls.",
				"after challenging {count} diverse factions of the forest.",
				"proving their worth against {count} unique adversaries."
			]
		};

		window.CONFIG = {{ backend_config_json | default('{}') }};
		window.relationsData = {{ relations_json | default('{}') | safe }};
	</script>
{% endblock %}
