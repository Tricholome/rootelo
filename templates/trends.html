{% extends "base.html" %}

{% block extra_head %}
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
{% endblock %}

{% block content %}
    <div class="search-box">
        <input type="search" list="playerList" id="playerName" placeholder="Search Player..." oninput="updateChart()">
        <datalist id="playerList">
            {% for name in player_names %}
                <option value="{{ name }}">
            {% endfor %}
        </datalist>
    </div>
    
    <div class="chart-wrapper">
        <div class="chart-container">
            <canvas id="progressionChart"></canvas>
        </div>
    </div>
{% endblock %}

{% block custom_js %}
<script>
    const allData = {{ history_json | safe }};
    let myChart;

    function updateChart() {
        const input = document.getElementById('playerName');
        const name = input.value;

        if (name === "" || !allData[name]) {
            if (myChart) myChart.destroy();
            localStorage.removeItem('selectedPlayer');
            return;
        }

        const canvas = document.getElementById('progressionChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        const rabbitColor = getComputedStyle(document.documentElement)
                            .getPropertyValue('--color-rabbit').trim() || '#E0B634';
        
        localStorage.setItem('selectedPlayer', name);

        const rawData = allData[name];
        
        // Conversion des données pour l'axe temporel
        const dataPoints = rawData.map(d => ({
            x: new Date(d[0]),
            y: d[1]
        }));

        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [{
                    data: dataPoints,
                    borderColor: rabbitColor,
                    backgroundColor: rabbitColor + '15', // Légèrement plus transparent
                    borderWidth: 4, // Ligne un peu plus épaisse
                    fill: true,
                    
                    // --- LA CORRECTION EST ICI ---
                    tension: 0, // Désactive complètement le lissage (lignes droites)
                    // -----------------------------
                    
                    pointRadius: 4, // Points légèrement plus grands
                    pointBackgroundColor: rabbitColor,
                    pointHoverRadius: 6, // Effet au survol
                    pointHitRadius: 20
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                // Pour éviter que la ligne ne bave sur les bords
                layout: {
                    padding: {
                        top: 10,
                        right: 10,
                        bottom: 10,
                        left: 0
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { 
                        enabled: true, 
                        backgroundColor: '#222',
                        titleColor: rabbitColor,
                        titleFont: {
                            family: 'var(--font-ui)',
                            weight: 'bold'
                        },
                        bodyFont: {
                            family: 'var(--font-ui)'
                        },
                        callbacks: {
                            title: (items) => {
                                // Formatage de la date dans le tooltip (ex: 12 Jan 2024)
                                return new Date(items[0].parsed.x).toLocaleDateString('en-GB', {
                                    day: 'numeric',
                                    month: 'short',
                                    year: 'numeric'
                                });
                            },
                            label: (context) => {
                                return ` ELO: ${context.parsed.y}`;
                            }
                        }
                    }
                },
                scales: {
                    y: { 
                        grid: { color: '#252525' }, 
                        ticks: { 
                            color: '#888',
                            font: { family: 'var(--font-ui)' }
                        } 
                    },
                    x: { 
                        type: 'time',
                        time: {
                            unit: 'day',
                            displayFormats: {
                                day: 'MMM d'
                            }
                        },
                        grid: { display: false }, 
                        ticks: { 
                            color: '#888', 
                            font: { family: 'var(--font-ui)' },
                            maxRotation: 0,
                            autoSkip: true,
                            maxTicksLimit: 8 
                        } 
                    }
                }
            }
        });
    } // Fin de updateChart

    window.onload = function() {
        const savedPlayer = localStorage.getItem('selectedPlayer');
        const input = document.getElementById('playerName');

        if (savedPlayer && allData[savedPlayer]) {
            input.value = savedPlayer;
            updateChart();
        }
    };
</script>
{% endblock %}
