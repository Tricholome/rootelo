{% extends "base.html" %}

{% block extra_head %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- Organigramme binaire épuré (Jaune Lapin) --- */
        .relations-wrapper {
            margin-top: 40px;
            padding: 20px;
            background-color: rgba(43, 37, 27, 0.3);
            border-radius: 12px;
            color: #f7f5f0;
        }

        .relations-title {
            text-align: center;
            color: #f3c64f;
            margin-bottom: 25px;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .relations-container {
            display: flex;
            flex-direction: column; /* Passage en vertical */
            align-items: center;
            justify-content: space-between;
            position: relative;
            max-width: 300px; /* Plus étroit pour le vertical */
            margin: 0 auto;
            height: 350px; /* Hauteur ajustée */
        }

        .tier-icon {
            width: 32px;
            height: 32px;
            vertical-align: middle;
            margin-right: 8px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
        }

        .node { /* Ajustement mineur pour le vertical */
            min-width: 240px; 
            text-align: center;
        }

        .relations-lines {
            position: absolute;
            top: 60px; /* Début après le premier node */
            bottom: 60px; /* Fin avant le dernier node */
            width: 100px;
            left: calc(50% - 50px);
            pointer-events: none;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="search-box">
        <input type="search" list="playerList" id="playerName" value="" placeholder="Search Player..." oninput="updatePlayerView()">
        <datalist id="playerList">
            {% for name in player_names %}
                <option value="{{ name }}">
            {% endfor %}
        </datalist>
    </div>
    
    <div class="chart-wrapper">
        <div class="chart-container">
            <canvas id="progressionChart"></canvas>
        </div>
    </div>

    <div class="relations-wrapper">
        <div class="relations-title">Chroniques des Clairières</div>
        <div class="relations-container">
            
            <!-- TROPHY (Haut) -->
            <div class="node target-node" id="nodeTarget" onclick="selectPlayerFromTree(this)" data-player="">
                <div class="role-tag">Top Nemesis (Trophy)</div>
                <div class="action-text" id="textTarget">...</div>
            </div>

            <!-- CENTRAL (Milieu) -->
            <div class="node central-node">
                <div class="role-tag">Active Player</div>
                <span class="player-name" id="centerPlayerName">Select a player</span>
            </div>

            <!-- BANE (Bas) -->
            <div class="node target-node" id="nodeNemesis" onclick="selectPlayerFromTree(this)" data-player="">
                <div class="role-tag">Favorite Target (Bane)</div>
                <div class="action-text" id="textNemesis">...</div>
            </div>

            <!-- SVG lines -->
            <svg class="relations-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
                <!-- Ligne vers le haut -->
                <path d="M 50 100 L 50 60" stroke="#f3c64f" stroke-width="2" fill="none" />
                <!-- Ligne vers le bas -->
                <path d="M 50 0 L 50 40" stroke="#f3c64f" stroke-width="2" fill="none" />
            </svg>
        </div>
    </div>

    <script>
        const relationsData = {{ relations_json | safe }};
        // Mapping des icônes depuis la config Jinja
        const tierIcons = {{ config.assets.icons | tojson }};

        function getIconHtml(tier) {
            const iconUrl = tierIcons[tier] || tierIcons['default'];
            return `<img src="${iconUrl}" class="tier-icon" alt="${tier}">`;
        }

        function updateRelationsTree(playerName) {
            const data = relationsData[playerName];
            
            if (data) {
                document.getElementById('centerPlayerName').innerText = playerName;
                
                // Trophy (Top)
                const trophyName = data.trophy.name || "None";
                const trophyIcon = data.trophy.tier ? getIconHtml(data.trophy.tier) : "";
                document.getElementById('textTarget').innerHTML = `${trophyIcon} <strong>${trophyName}</strong>`;
                document.getElementById('nodeTarget').setAttribute('data-player', trophyName);
                
                // Bane (Bottom)
                const baneName = data.bane.name || "None";
                const baneIcon = data.bane.tier ? getIconHtml(data.bane.tier) : "";
                document.getElementById('textNemesis').innerHTML = `${baneIcon} <strong>${baneName}</strong>`;
                document.getElementById('nodeNemesis').setAttribute('data-player', baneName);
            }
        }
		
        function selectPlayerFromTree(element) {
            const clickedName = element.getAttribute('data-player');
            if (clickedName) {
                document.getElementById('playerName').value = clickedName;
                updatePlayerView();
            }
        }

        function updatePlayerView() {
            const currentPlayer = document.getElementById('playerName').value;
            if (currentPlayer) {
                updateRelationsTree(currentPlayer);
                // Si tu as une fonction updateChart existante, appelle-la ici :
                // updateChart(currentPlayer); 
            }
        }

        window.onload = function() {
            // Initialisation si besoin
            const firstPlayer = document.getElementById('playerName').value;
            if (firstPlayer) updatePlayerView();
        };
    </script>
{% endblock %}
