{% extends "base.html" %}

{% block extra_head %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block extra_css %}
<style>
    .search-box { margin: 20px 0; text-align: center; }
    input { 
        background: var(--bg-surface); /* Utilise ton gris d'interface */
        color: var(--text-main); 
        border: 1px solid var(--border-soft); 
        padding: 12px; 
        border-radius: 8px; 
        width: 95%; 
        max-width: 450px; 
        font-size: 16px; 
        box-sizing: border-box; 
        outline: none;
    }
    input:focus { border-color: var(--color-rabbit); } /* Focus couleur lapin */
    
    input::-webkit-search-cancel-button {
        -webkit-appearance: none;
        height: 14px; width: 14px;
        background-color: var(--text-muted); /* Couleur grise */
        mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z'/></svg>") no-repeat 50% 50%;
        -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z'/></svg>") no-repeat 50% 50%;
        cursor: pointer;
    }

    .landscape-hint { 
        display: none; color: #666; font-size: 0.7em; 
        margin-bottom: 10px; text-transform: uppercase; 
        letter-spacing: 1px; text-align: center;
    }

    /* Correction du centrage */
    .chart-wrapper { 
        width: 100%; 
        max-width: 1000px; /* On aligne sur la largeur max du contenu */
        margin: 0 auto;    /* Centrage horizontal */
        padding: 0;        /* On enlève les paddings qui décalent */
        box-sizing: border-box; 
    }

    .chart-container { 
        position: relative; 
        width: 100%; 
        height: 55vh; 
        background: #1a1a1a; 
        border-radius: 12px; 
        border: 1px solid #252525; 
        padding: 10px;    /* Réduit pour laisser plus de place au canvas */
        box-sizing: border-box;
    }

    @media (max-width: 768px) and (orientation: portrait) { 
        .landscape-hint { display: block; } 
    }
</style>
{% endblock %}

{% block content %}
    <div class="search-box">
        <input type="search" list="playerList" id="playerName" placeholder="Search Player..." oninput="updateChart()">
        <datalist id="playerList">
            {% for name in player_names %}
                <option value="{{ name }}">
            {% endfor %}
        </datalist>
    </div>

    <div class="landscape-hint">🔄 Rotate phone for detail</div>
    
    <div class="chart-wrapper">
        <div class="chart-container">
            <canvas id="progressionChart"></canvas>
        </div>
    </div>
{% endblock %}

{% block custom_js %}
<script>
    const allData = {{ history_json | safe }};
    let myChart;

    function updateChart() {
        const input = document.getElementById('playerName');
        const name = input.value;
        if (name === "") {
            if (myChart) myChart.destroy();
            localStorage.removeItem('selectedPlayer');
            return;
        }
        const canvas = document.getElementById('progressionChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        const rabbitColor = getComputedStyle(document.documentElement)
                            .getPropertyValue('--color-rabbit').trim() || '#E0B634';
        
        if (allData[name]) {
            // SAUVEGARDE : On mémorise le nom du joueur
            localStorage.setItem('selectedPlayer', name);

            const rawData = allData[name];
            const labels = rawData.map(d => d[0]);
            const eloScores = rawData.map(d => d[1]);

            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: eloScores,
                        borderColor: rabbitColor,
                        backgroundColor: rabbitColor + '22',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3,
                        pointBackgroundColor: rabbitColor,
                        pointHitRadius: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { 
                            enabled: true, 
                            backgroundColor: '#222',
                            titleColor: rabbitColor
                        }
                    },
                    scales: {
                        y: { grid: { color: '#252525' }, ticks: { color: '#888' } },
                        x: { grid: { display: false }, ticks: { color: '#888', maxTicksLimit: 6 } }
                    }
                }
            });
        }
    }

    // CHARGEMENT : Au chargement de la page
    window.onload = function() {
        const savedPlayer = localStorage.getItem('selectedPlayer');
        const input = document.getElementById('playerName');

        // Si on a un joueur en mémoire ET qu'il existe dans les données de cette saison
        if (savedPlayer && allData[savedPlayer]) {
            input.value = savedPlayer;
            updateChart();
        } else {
            // Optionnel : Si le joueur n'existe pas dans cette saison, on peut vider le champ
            // input.value = "";
        }
    };
</script>
{% endblock %}
