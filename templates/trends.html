{% extends "base.html" %}

{% block extra_head %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}
    <div class="search-box">
        <input type="search" list="playerList" id="playerName" value="" placeholder="Search Player..." oninput="updatePlayerView()">
        <datalist id="playerList">
            {% for name in player_names %}
                <option value="{{ name }}">
            {% endfor %}
        </datalist>
    </div>
    
    <div class="chart-wrapper">
        <div class="chart-container">
            <canvas id="progressionChart"></canvas>
        </div>
    </div>

    <div class="relations-wrapper">
        <div class="relations-container">
            
            <div class="left-column">
				<div class="node central-node">
					<div id="centerPlayerIntro"></div>
					<div class="player-name" id="centerPlayerName">Select a player</div>
					<div id="centerPlayerMeta"></div>
				</div>
			</div>

            <div class="middle-space">
                <svg class="relations-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M 0 50 C 50 50, 50 20, 100 20" stroke="#f3c64f" stroke-width="2.5" fill="none" />
                    <path d="M 0 50 C 50 50, 50 80, 100 80" stroke="#f3c64f" stroke-width="2.5" fill="none" />
                </svg>
            </div>

            <div class="right-column">
                <div class="node interactive-node" id="nodeTrophy" onclick="selectPlayerFromTree(this)" data-player="">
                    <div id="textTrophy">
                        <div class="player-name">...</div>
                    </div>
                </div>

                <div class="node interactive-node" id="nodeBane" onclick="selectPlayerFromTree(this)" data-player="">
                    <div id="textBane">
                        <div class="player-name">...</div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
		window.NARRATIVE_VARIATIONS = {
			center: [
				"On this winding journey,",
				"During this epic season,",
				"Deep within the Woodland,",
				"From clearing to clearing,",
				"Across the many paths,"
			],
			trophy: [
				"...brought down the mighty",
				"...found a way to defeat",
				"...secured a big upset against",
				"...earned a solid win over",
				"...scored a major win against",
				"...proved their worth by beating"
			],
			trophy_empty: [
				"...but suffered only bitter losses...",
				"...but couldn't secure any victories..."
			],
			bane: [
				"...and fell before the humble",
				"...only to be defeated by",
				"...and conceded a shocking setback to",
				"...and was caught off guard by",
				"...and lost a surprising match to",
				"...only to stumble against"
			],
			bane_empty: [
				"...and never once tasted defeat.",
				"...and refused to concede any losses."
			],
			opponents: [
				"faced {count} different opponents...",
				"engaged with {count} other souls...",
				"matched up with {count} rivals...",
				"took on {count} competitors...",
				"met {count} other wanderers..."
			]
		};

		window.CONFIG = {{ backend_config_json | default('{}') }};
		window.relationsData = {{ relations_json | default('{}') | safe }};
	</script>
{% endblock %}
